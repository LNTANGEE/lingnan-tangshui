<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>岭南甜记｜糖水配方云端系统</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f7f4ef;
      --card:#fff;
      --text:#2c241d;
      --muted:#7a6b5d;
      --accent:#8b5e3c;
      --accent2:#c89f7a;
      --border:#eadfce;
      --input:#fffdf9;
      --good:#1f7a4d;
      --danger:#a63d40;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      background:linear-gradient(180deg,#fbf8f3 0%,var(--bg) 100%);
      color:var(--text);
    }
    .wrap{max-width:1280px;margin:0 auto;padding:20px}
    .title{font-size:28px;font-weight:800;margin:0 0 8px;color:var(--accent)}
    .subtitle{margin:0 0 16px;color:var(--muted);line-height:1.6;font-size:14px}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
      margin-bottom:16px;
    }
    .grid{display:grid;grid-template-columns:360px 1fr;gap:16px}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 8px 28px rgba(84,60,38,.06);
      padding:16px;
    }
    h2{margin:0 0 14px;font-size:18px;color:var(--accent)}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
    input,select,button,textarea{font:inherit}
    input,select,textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 12px;
      background:var(--input);
      color:var(--text);
      outline:none;
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--accent2);
      box-shadow:0 0 0 3px rgba(200,159,122,.15);
    }
    .section+.section{margin-top:14px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
    button{
      border:none;border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:700;
    }
    .btn-primary{background:var(--accent);color:#fff}
    .btn-secondary{background:#efe6db;color:var(--accent)}
    .btn-ghost{background:#f7f1e9;color:#6c533d}
    .btn-danger{background:#f6e1e1;color:var(--danger)}
    .btn-small{padding:8px 10px;font-size:13px}
    .hidden{display:none!important}
    .pill{
      background:#f5ede3;color:var(--accent);padding:8px 12px;border-radius:999px;
      font-size:13px;font-weight:700;
    }
    .head{
      display:flex;justify-content:space-between;align-items:center;gap:12px;
      margin-bottom:12px;flex-wrap:wrap;
    }
    .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
    .summary-box{background:#fcf8f2;border:1px solid var(--border);border-radius:14px;padding:12px}
    .summary-box .k{font-size:12px;color:var(--muted);margin-bottom:6px}
    .summary-box .v{font-size:20px;font-weight:800;color:var(--accent)}
    .ingredient-line{
      display:grid;
      grid-template-columns:1.2fr .8fr .7fr 1fr auto;
      gap:8px;
      margin-bottom:8px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
    }
    th,td{
      padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:14px;
    }
    th{background:#f8f1e8;color:var(--accent);font-weight:800}
    tr:last-child td{border-bottom:none}
    .muted{color:var(--muted)}
    .good{color:var(--good);font-weight:700}
    .tip{
      margin-top:12px;padding:12px;background:#fbf6ef;border:1px dashed var(--border);
      border-radius:12px;color:var(--muted);font-size:13px;line-height:1.6;
      white-space:pre-line;
    }
    .small{font-size:12px;color:var(--muted)}
    #authCard{max-width:460px;margin:40px auto}
    @media (max-width:980px){
      .grid,.summary-grid,.row3{grid-template-columns:1fr}
    }
    @media (max-width:700px){
      .row{grid-template-columns:1fr}
      .ingredient-line{grid-template-columns:1fr 1fr}
      .ingredient-line button{grid-column:span 2}
      .title{font-size:24px}
      th,td{font-size:13px;padding:9px 10px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="authView">
      <div class="card" id="authCard">
        <div class="title">岭南甜记｜糖水配方云端系统</div>
        <p class="subtitle">先用邮箱登录。第一版先做老板可管理、店长可查看计算。</p>

        <div class="section">
          <label for="email">邮箱</label>
          <input id="email" type="email" placeholder="输入你的邮箱" />
        </div>

        <div class="section">
          <label for="password">密码</label>
          <input id="password" type="password" placeholder="输入密码" />
        </div>

        <div class="btns">
          <button class="btn-primary" id="loginBtn">登录</button>
          <button class="btn-secondary" id="signupBtn">注册</button>
          <button class="btn-ghost" id="logoutBtnAuth">退出登录</button>
        </div>

        <div class="tip" id="authMsg">第一次用可以先注册一个老板账号。</div>
      </div>
    </div>

    <div id="appView" class="hidden">
      <div class="topbar">
        <div>
          <div class="title">岭南甜记｜糖水配方云端系统</div>
          <p class="subtitle">手机和电脑打开同一个网址，就能看到同一套配方数据。</p>
        </div>
        <div class="btns">
          <span class="pill" id="userInfo">未登录</span>
          <button class="btn-secondary btn-small" id="refreshBtn">刷新数据</button>
          <button class="btn-danger btn-small" id="logoutBtn">退出</button>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h2>配方管理</h2>

          <div class="section">
            <label for="recipeSelect">选择配方</label>
            <select id="recipeSelect"></select>
          </div>

          <div class="section row">
            <div>
              <label for="recipeName">配方名称</label>
              <input id="recipeName" placeholder="例如：木薯糖水" />
            </div>
            <div>
              <label for="yieldPerBatch">标准配方可出几份</label>
              <input id="yieldPerBatch" type="number" step="0.01" placeholder="例如：20" />
            </div>
          </div>

          <div class="section row">
            <div>
              <label for="baseName">基准项名称</label>
              <input id="baseName" placeholder="例如：水 / 牛奶 / 成品总量" />
            </div>
            <div>
              <label for="baseAmount">标准基准量</label>
              <input id="baseAmount" type="number" step="0.01" placeholder="例如：1000" />
            </div>
          </div>

          <div class="section row3">
            <div>
              <label for="calcMode">计算模式</label>
              <select id="calcMode">
                <option value="base">按基准量计算</option>
                <option value="portion">按份数计算</option>
              </select>
            </div>
            <div id="baseTargetWrap">
              <label for="targetAmount">今天输入的基准量</label>
              <input id="targetAmount" type="number" step="0.01" placeholder="例如：2500" />
            </div>
            <div id="portionTargetWrap" class="hidden">
              <label for="targetPortions">今天准备几份</label>
              <input id="targetPortions" type="number" step="0.01" placeholder="例如：35" />
            </div>
          </div>

          <div class="section">
            <label>配料明细</label>
            <div id="ingredientsList"></div>
            <button class="btn-secondary" id="addIngredientBtn" type="button">+ 新增配料</button>
          </div>

          <div class="btns">
            <button class="btn-primary" id="calcBtn" type="button">立即计算</button>
            <button class="btn-secondary" id="saveRecipeBtn" type="button">保存配方</button>
            <button class="btn-ghost" id="newRecipeBtn" type="button">新建配方</button>
            <button class="btn-danger" id="deleteRecipeBtn" type="button">删除配方</button>
          </div>

          <div class="tip" id="leftTip">老板可以编辑配方。店长版第二步再做权限细分。</div>
        </div>

        <div class="card">
          <div class="head">
            <h2 style="margin:0;">计算结果</h2>
            <div class="pill" id="resultTitle">请选择或新建一个配方</div>
          </div>

          <div class="summary-grid">
            <div class="summary-box">
              <div class="k">标准基准量</div>
              <div class="v" id="summaryBase">-</div>
            </div>
            <div class="summary-box">
              <div class="k">今日输入量</div>
              <div class="v" id="summaryTarget">-</div>
            </div>
            <div class="summary-box">
              <div class="k">放大倍数</div>
              <div class="v" id="summaryRatio">-</div>
            </div>
            <div class="summary-box">
              <div class="k">预计份数</div>
              <div class="v" id="summaryPortions">-</div>
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>配料名称</th>
                <th>标准用量</th>
                <th>单位</th>
                <th>今日需用量</th>
                <th>单份约用量</th>
              </tr>
            </thead>
            <tbody id="resultBody">
              <tr><td colspan="5" class="muted">暂无结果</td></tr>
            </tbody>
          </table>

          <div class="btns">
            <button class="btn-primary" id="copyBtn" type="button">复制备料清单</button>
            <button class="btn-secondary" id="exportTextBtn" type="button">导出文本</button>
          </div>

          <div class="tip" id="exportPreview">这里会显示可直接发给店长或员工的备料清单。</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ====== 这里换成你的 Supabase 信息 ======
    const SUPABASE_URL = 'https://vehhqyrqljlgvplmlgfk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlaGhxeXJxbGpsZ3ZwbG1sZ2ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzUzOTEsImV4cCI6MjA4OTI1MTM5MX0.NXs93cMQszFhjlpMLO5ltQbirgE-w4OmChnoTKgA4ZU';
    // =====================================

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let recipes = [];
    let recipeItems = [];
    let currentRecipeId = null;

    const authView = document.getElementById('authView');
    const appView = document.getElementById('appView');
    const authMsg = document.getElementById('authMsg');
    const userInfo = document.getElementById('userInfo');

    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const logoutBtnAuth = document.getElementById('logoutBtnAuth');
    const refreshBtn = document.getElementById('refreshBtn');

    const recipeSelect = document.getElementById('recipeSelect');
    const recipeName = document.getElementById('recipeName');
    const yieldPerBatch = document.getElementById('yieldPerBatch');
    const baseName = document.getElementById('baseName');
    const baseAmount = document.getElementById('baseAmount');
    const calcMode = document.getElementById('calcMode');
    const targetAmount = document.getElementById('targetAmount');
    const targetPortions = document.getElementById('targetPortions');
    const baseTargetWrap = document.getElementById('baseTargetWrap');
    const portionTargetWrap = document.getElementById('portionTargetWrap');
    const ingredientsList = document.getElementById('ingredientsList');

    const resultTitle = document.getElementById('resultTitle');
    const resultBody = document.getElementById('resultBody');
    const summaryBase = document.getElementById('summaryBase');
    const summaryTarget = document.getElementById('summaryTarget');
    const summaryRatio = document.getElementById('summaryRatio');
    const summaryPortions = document.getElementById('summaryPortions');
    const exportPreview = document.getElementById('exportPreview');

    const addIngredientBtn = document.getElementById('addIngredientBtn');
    const calcBtn = document.getElementById('calcBtn');
    const saveRecipeBtn = document.getElementById('saveRecipeBtn');
    const newRecipeBtn = document.getElementById('newRecipeBtn');
    const deleteRecipeBtn = document.getElementById('deleteRecipeBtn');
    const copyBtn = document.getElementById('copyBtn');
    const exportTextBtn = document.getElementById('exportTextBtn');

    function fmt(val) {
      const num = Number(val || 0);
      if (Number.isNaN(num)) return '-';
      if (Number.isInteger(num)) return String(num);
      return num.toFixed(2).replace(/\.00$/, '').replace(/(\.[1-9]*)0+$/, '$1');
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showAuth(msg = '请登录') {
      authView.classList.remove('hidden');
      appView.classList.add('hidden');
      authMsg.textContent = msg;
    }

    function showApp(user) {
      authView.classList.add('hidden');
      appView.classList.remove('hidden');
      userInfo.textContent = user?.email || '已登录';
    }

    async function signUp() {
      const { error } = await supabaseClient.auth.signUp({
        email: email.value.trim(),
        password: password.value.trim()
      });
      authMsg.textContent = error ? ('注册失败：' + error.message) : '注册成功，请直接登录。';
    }

    async function signIn() {
      const { error } = await supabaseClient.auth.signInWithPassword({
        email: email.value.trim(),
        password: password.value.trim()
      });
      authMsg.textContent = error ? ('登录失败：' + error.message) : '登录成功';
      if (!error) {
        await initApp();
      }
    }

    async function signOut() {
      await supabaseClient.auth.signOut();
      showAuth('已退出登录');
    }

    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();
      const user = data?.session?.user;
      if (user) {
        showApp(user);
        await initApp();
      } else {
        showAuth('请登录');
      }
    }

    async function loadRecipes() {
      const { data, error } = await supabaseClient
        .from('recipes')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        alert('读取 recipes 失败：' + error.message);
        return [];
      }
      return data || [];
    }

    async function loadRecipeItems() {
      const { data, error } = await supabaseClient
        .from('recipe_items')
        .select('*')
        .order('sort_order', { ascending: true });

      if (error) {
        alert('读取 recipe_items 失败：' + error.message);
        return [];
      }
      return data || [];
    }

    function renderRecipeSelect() {
      recipeSelect.innerHTML = '';
      recipes.forEach(r => {
        const option = document.createElement('option');
        option.value = r.id;
        option.textContent = r.name;
        recipeSelect.appendChild(option);
      });
      if (currentRecipeId) recipeSelect.value = currentRecipeId;
    }

    function getCurrentRecipe() {
      return recipes.find(r => r.id === currentRecipeId);
    }

    function getCurrentRecipeItems() {
      return recipeItems.filter(i => i.recipe_id === currentRecipeId);
    }

    function renderIngredientInputs(items) {
      ingredientsList.innerHTML = '';
      items.forEach((item, index) => {
        const line = document.createElement('div');
        line.className = 'ingredient-line';
        line.innerHTML = `
          <input placeholder="配料名称" value="${escapeHtml(item.item_name)}" data-type="name" data-index="${index}">
          <input placeholder="标准用量" type="number" step="0.01" value="${item.amount}" data-type="amount" data-index="${index}">
          <input placeholder="单位" value="${escapeHtml(item.unit || 'g')}" data-type="unit" data-index="${index}">
          <input placeholder="备注" value="${escapeHtml(item.note || '')}" data-type="note" data-index="${index}">
          <button class="btn-ghost" type="button" data-index="${index}">删除</button>
        `;
        ingredientsList.appendChild(line);
      });
    }

    function fillForm(recipe) {
      if (!recipe) {
        recipeName.value = '';
        yieldPerBatch.value = '';
        baseName.value = '';
        baseAmount.value = '';
        ingredientsList.innerHTML = '';
        renderResults();
        return;
      }

      recipeName.value = recipe.name || '';
      yieldPerBatch.value = recipe.yield_per_batch || '';
      baseName.value = recipe.base_name || '';
      baseAmount.value = recipe.base_amount || '';
      targetAmount.value = recipe.base_amount || '';
      targetPortions.value = recipe.yield_per_batch || '';

      renderIngredientInputs(getCurrentRecipeItems());
      renderResults();
    }

    function collectFormRecipe() {
      const lines = Array.from(ingredientsList.querySelectorAll('.ingredient-line'));
      const items = lines.map((line, idx) => {
        const inputs = line.querySelectorAll('input');
        return {
          item_name: inputs[0].value.trim(),
          amount: Number(inputs[1].value || 0),
          unit: inputs[2].value.trim() || 'g',
          note: inputs[3].value.trim(),
          sort_order: idx
        };
      }).filter(i => i.item_name);

      return {
        recipe: {
          id: currentRecipeId,
          name: recipeName.value.trim() || '未命名配方',
          base_name: baseName.value.trim() || '水',
          base_amount: Number(baseAmount.value || 0),
          yield_per_batch: Number(yieldPerBatch.value || 0)
        },
        items
      };
    }

    function getCalcContext(recipe) {
      const base = Number(recipe?.base_amount || 0);
      const stdPortions = Number(recipe?.yield_per_batch || 0);
      const mode = calcMode.value;
      let ratio = 0;
      let targetText = '-';
      let portions = 0;

      if (mode === 'base') {
        const target = Number(targetAmount.value || 0);
        ratio = base > 0 ? target / base : 0;
        targetText = target ? `${recipe.base_name} ${fmt(target)}` : '-';
        portions = stdPortions ? stdPortions * ratio : 0;
      } else {
        const p = Number(targetPortions.value || 0);
        ratio = stdPortions > 0 ? p / stdPortions : 0;
        targetText = p ? `${fmt(p)} 份` : '-';
        portions = p;
      }

      return { base, stdPortions, ratio, targetText, portions };
    }

    function renderResults() {
      const recipe = getCurrentRecipe() || {
        name: recipeName.value,
        base_name: baseName.value,
        base_amount: baseAmount.value,
        yield_per_batch: yieldPerBatch.value
      };

      let items = getCurrentRecipeItems();
      if (!items.length) {
        const lines = Array.from(ingredientsList.querySelectorAll('.ingredient-line'));
        items = lines.map((line, idx) => {
          const inputs = line.querySelectorAll('input');
          return {
            item_name: inputs[0].value.trim(),
            amount: Number(inputs[1].value || 0),
            unit: inputs[2].value.trim() || 'g',
            note: inputs[3].value.trim(),
            sort_order: idx
          };
        }).filter(i => i.item_name);
      }

      resultTitle.textContent = recipe?.name || '请选择配方';
      const { base, stdPortions, ratio, targetText, portions } = getCalcContext(recipe);

      summaryBase.textContent = base ? `${recipe.base_name} ${fmt(base)}` : '-';
      summaryTarget.textContent = targetText;
      summaryRatio.textContent = ratio ? `${fmt(ratio)} 倍` : '-';
      summaryPortions.textContent = portions ? `${fmt(portions)} 份` : '-';

      if (!items.length || !ratio) {
        resultBody.innerHTML = '<tr><td colspan="5" class="muted">请输入数据后再计算</td></tr>';
        exportPreview.textContent = '这里会显示可直接发给店长或员工的备料清单。';
        return;
      }

      const rows = items.map(item => {
        const needed = item.amount * ratio;
        const perPortion = stdPortions ? item.amount / stdPortions : 0;
        return { ...item, needed, perPortion };
      });

      resultBody.innerHTML = rows.map(r => `
        <tr>
          <td>${escapeHtml(r.item_name)}${r.note ? `<div class="small">${escapeHtml(r.note)}</div>` : ''}</td>
          <td>${fmt(r.amount)}</td>
          <td>${escapeHtml(r.unit)}</td>
          <td class="good">${fmt(r.needed)} ${escapeHtml(r.unit)}</td>
          <td>${r.perPortion ? fmt(r.perPortion) + ' ' + escapeHtml(r.unit) : '-'}</td>
        </tr>
      `).join('');

      exportPreview.textContent = [
        `【${recipe.name}】备料清单`,
        `基准项：${recipe.base_name}`,
        `标准基准量：${fmt(base)}`,
        recipe.yield_per_batch ? `标准可出：${fmt(recipe.yield_per_batch)}份` : '',
        `当前模式：${calcMode.value === 'base' ? '按基准量计算' : '按份数计算'}`,
        `当前输入：${targetText}`,
        `放大倍数：${fmt(ratio)}倍`,
        portions ? `预计份数：${fmt(portions)}份` : '',
        '',
        ...rows.map(r => `${r.item_name}：${fmt(r.needed)} ${r.unit}`)
      ].filter(Boolean).join('\n');
    }

    async function saveCurrentRecipe() {
      const form = collectFormRecipe();
      const recipePayload = form.recipe;

      let recipeId = recipePayload.id;

      if (!recipeId) {
        const { data, error } = await supabaseClient
          .from('recipes')
          .insert([{
            name: recipePayload.name,
            base_name: recipePayload.base_name,
            base_amount: recipePayload.base_amount,
            yield_per_batch: recipePayload.yield_per_batch
          }])
          .select()
          .single();

        if (error) {
          alert('新建 recipes 失败：' + error.message);
          return;
        }
        recipeId = data.id;
        currentRecipeId = recipeId;
      } else {
        const { error } = await supabaseClient
          .from('recipes')
          .update({
            name: recipePayload.name,
            base_name: recipePayload.base_name,
            base_amount: recipePayload.base_amount,
            yield_per_batch: recipePayload.yield_per_batch
          })
          .eq('id', recipeId);

        if (error) {
          alert('更新 recipes 失败：' + error.message);
          return;
        }
      }

      const { error: delErr } = await supabaseClient
        .from('recipe_items')
        .delete()
        .eq('recipe_id', recipeId);

      if (delErr) {
        alert('清空旧配料失败：' + delErr.message);
        return;
      }

      if (form.items.length) {
        const insertItems = form.items.map(i => ({
          recipe_id: recipeId,
          item_name: i.item_name,
          amount: i.amount,
          unit: i.unit,
          note: i.note,
          sort_order: i.sort_order
        }));

        const { error: itemErr } = await supabaseClient
          .from('recipe_items')
          .insert(insertItems);

        if (itemErr) {
          alert('保存配料失败：' + itemErr.message);
          return;
        }
      }

      alert('保存成功');
      await initApp();
    }

    async function deleteCurrentRecipe() {
      const recipe = getCurrentRecipe();
      if (!recipe) return;
      if (!confirm(`确定删除配方「${recipe.name}」吗？`)) return;

      const { error } = await supabaseClient
        .from('recipes')
        .delete()
        .eq('id', recipe.id);

      if (error) {
        alert('删除失败：' + error.message);
        return;
      }

      currentRecipeId = null;
      await initApp();
    }

    async function initApp() {
      recipes = await loadRecipes();
      recipeItems = await loadRecipeItems();

      if (!currentRecipeId && recipes.length) currentRecipeId = recipes[0].id;
      if (currentRecipeId && !recipes.find(r => r.id === currentRecipeId)) {
        currentRecipeId = recipes[0]?.id || null;
      }

      renderRecipeSelect();
      fillForm(getCurrentRecipe());
    }

    function addBlankIngredient() {
      const line = document.createElement('div');
      line.className = 'ingredient-line';
      line.innerHTML = `
        <input placeholder="配料名称">
        <input placeholder="标准用量" type="number" step="0.01" value="0">
        <input placeholder="单位" value="g">
        <input placeholder="备注">
        <button class="btn-ghost" type="button">删除</button>
      `;
      ingredientsList.appendChild(line);
      renderResults();
    }

    function newRecipe() {
      currentRecipeId = null;
      recipeSelect.value = '';
      recipeName.value = '';
      yieldPerBatch.value = '';
      baseName.value = '水';
      baseAmount.value = 1000;
      targetAmount.value = 1000;
      targetPortions.value = '';
      ingredientsList.innerHTML = '';
      addBlankIngredient();
      renderResults();
    }

    loginBtn.addEventListener('click', signIn);
    signupBtn.addEventListener('click', signUp);
    logoutBtn.addEventListener('click', signOut);
    logoutBtnAuth.addEventListener('click', signOut);
    refreshBtn.addEventListener('click', initApp);

    recipeSelect.addEventListener('change', () => {
      currentRecipeId = recipeSelect.value;
      fillForm(getCurrentRecipe());
    });

    calcMode.addEventListener('change', () => {
      const byBase = calcMode.value === 'base';
      baseTargetWrap.classList.toggle('hidden', !byBase);
      portionTargetWrap.classList.toggle('hidden', byBase);
      renderResults();
    });

    [recipeName, yieldPerBatch, baseName, baseAmount, targetAmount, targetPortions]
      .forEach(el => el.addEventListener('input', renderResults));

    ingredientsList.addEventListener('input', renderResults);
    ingredientsList.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') {
        e.target.closest('.ingredient-line')?.remove();
        renderResults();
      }
    });

    addIngredientBtn.addEventListener('click', addBlankIngredient);
    calcBtn.addEventListener('click', renderResults);
    saveRecipeBtn.addEventListener('click', saveCurrentRecipe);
    newRecipeBtn.addEventListener('click', newRecipe);
    deleteRecipeBtn.addEventListener('click', deleteCurrentRecipe);

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(exportPreview.textContent);
        alert('备料清单已复制');
      } catch {
        alert('复制失败，请手动复制');
      }
    });

    exportTextBtn.addEventListener('click', () => {
      const blob = new Blob([exportPreview.textContent], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${(recipeName.value || '备料清单').trim()}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    });

    checkSession();
  </script>
</body>
</html>

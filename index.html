<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>岭南甜记｜配方备料系统 V2</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --text: #2c241d;
      --muted: #7a6b5d;
      --accent: #8b5e3c;
      --accent-2: #c89f7a;
      --border: #eadfce;
      --input: #fffdf9;
      --good: #1f7a4d;
      --danger: #a63d40;
      --warn: #b2771f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #fbf8f3 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 16px; }
    .title { font-size: 28px; font-weight: 800; color: var(--accent); margin: 0 0 6px; }
    .subtitle { color: var(--muted); margin: 0; font-size: 14px; line-height: 1.6; }
    .hidden { display: none !important; }
    .topbar {
      display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(84, 60, 38, 0.06);
      padding: 16px;
    }
    .auth-card { max-width: 460px; margin: 48px auto; }
    h2 { margin: 0 0 12px; color: var(--accent); font-size: 18px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); font-weight: 700; }
    input, select, textarea, button {
      font: inherit;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--input);
      color: var(--text);
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(200,159,122,.15);
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #efe6db; color: var(--accent); }
    .btn-ghost { background: #f7f1e9; color: #6c533d; }
    .btn-danger { background: #f7e3e3; color: var(--danger); }
    .btn-small { padding: 8px 10px; font-size: 13px; }
    .pill {
      background: #f5ede3;
      color: var(--accent);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
    }
    .section + .section { margin-top: 14px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .tip {
      margin-top: 12px;
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: #fbf6ef;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-line;
    }
    .small { font-size: 12px; color: var(--muted); }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 8px 12px;
      border-radius: 999px;
      background: #f6efe6;
      color: #6f553f;
      cursor: pointer;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
    }
    .recipe-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 62vh;
      overflow: auto;
      padding-right: 2px;
    }
    .recipe-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: #fffdf9;
      cursor: pointer;
    }
    .recipe-item.active {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(200,159,122,.15);
    }
    .recipe-item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .recipe-item-name { font-weight: 800; }
    .recipe-item-meta { color: var(--muted); font-size: 12px; }
    .edit-panel-header {
      display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .ingredients-table {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ingredient-line {
      display: grid;
      grid-template-columns: 1.2fr .75fr .65fr 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .result-summary {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    .summary-box {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fcf8f2;
    }
    .summary-box .k { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .summary-box .v { font-size: 20px; color: var(--accent); font-weight: 800; }
    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 14px;
    }
    th { background: #f8f1e8; color: var(--accent); }
    tr:last-child td { border-bottom: none; }
    .good { color: var(--good); font-weight: 800; }
    .muted { color: var(--muted); }
    .mode-switch {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .result-summary, .row3 { grid-template-columns: 1fr; }
      .recipe-list { max-height: none; }
    }
    @media (max-width: 700px) {
      .title { font-size: 24px; }
      .row { grid-template-columns: 1fr; }
      .ingredient-line { grid-template-columns: 1fr 1fr; }
      .ingredient-line button { grid-column: span 2; }
      th, td { font-size: 13px; padding: 9px 10px; }
      .edit-panel-header { align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="authView">
      <div class="card auth-card">
        <div class="title">岭南甜记｜配方备料系统 V2</div>
        <p class="subtitle">新版支持分类：糖水 / 小吃，支持顺序调整，手机端不再一整页拉到底。</p>
        <div class="section">
          <label for="email">邮箱</label>
          <input id="email" type="email" placeholder="输入邮箱" />
        </div>
        <div class="section">
          <label for="password">密码</label>
          <input id="password" type="password" placeholder="输入密码" />
        </div>
        <div class="btns">
          <button class="btn-primary" id="loginBtn">登录</button>
          <button class="btn-secondary" id="signupBtn">注册</button>
        </div>
        <div class="tip" id="authMsg">第一次可以先注册一个老板账号。后面店长账号也可以单独注册。</div>
      </div>
    </div>

    <div id="appView" class="hidden">
      <div class="topbar">
        <div>
          <div class="title">岭南甜记｜配方备料系统 V2</div>
          <p class="subtitle">按类别管理配方。左边选分类和配方，右边编辑或计算，手机端体验更清爽。</p>
        </div>
        <div class="topbar-right">
          <span class="pill" id="userInfo">未登录</span>
          <button class="btn-secondary btn-small" id="refreshBtn">刷新</button>
          <button class="btn-danger btn-small" id="logoutBtn">退出</button>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h2>分类与配方</h2>
          <div class="tabs" id="categoryTabs"></div>
          <div class="btns">
            <button class="btn-secondary btn-small" id="addCategoryBtn">新增分类</button>
            <button class="btn-ghost btn-small" id="renameCategoryBtn">重命名分类</button>
          </div>
          <div class="tip" id="categoryTip">先点分类，再管理对应配方。</div>
          <div class="btns">
            <button class="btn-primary btn-small" id="newRecipeBtn">+ 新建配方</button>
          </div>
          <div class="recipe-list" id="recipeList"></div>
        </div>

        <div class="card">
          <div class="edit-panel-header">
            <h2 id="panelTitle">请选择配方</h2>
            <div class="btns">
              <button class="btn-secondary btn-small" id="moveRecipeUpBtn">配方上移</button>
              <button class="btn-secondary btn-small" id="moveRecipeDownBtn">配方下移</button>
              <button class="btn-danger btn-small" id="deleteRecipeBtn">删除配方</button>
            </div>
          </div>

          <div id="editorArea" class="hidden">
            <div class="row">
              <div>
                <label for="recipeName">配方名称</label>
                <input id="recipeName" placeholder="例如：木薯糖水" />
              </div>
              <div>
                <label for="yieldPerBatch">标准配方可出几份</label>
                <input id="yieldPerBatch" type="number" step="0.01" placeholder="例如：20" />
              </div>
            </div>

            <div class="row section">
              <div>
                <label for="baseName">基准项名称</label>
                <input id="baseName" placeholder="例如：水 / 牛奶 / 成品总量" />
              </div>
              <div>
                <label for="baseAmount">标准基准量</label>
                <input id="baseAmount" type="number" step="0.01" placeholder="例如：1000" />
              </div>
            </div>

            <div class="section">
              <div class="edit-panel-header" style="margin-bottom:8px;">
                <label style="margin:0;">配料明细</label>
                <div class="btns">
                  <button class="btn-secondary btn-small" id="addItemBtn">+ 新增配料</button>
                </div>
              </div>
              <div class="ingredients-table" id="ingredientsList"></div>
            </div>

            <div class="btns">
              <button class="btn-primary" id="saveRecipeBtn">保存配方</button>
            </div>

            <div class="tip">建议核心底料用代号，例如“糖浆A”“奶底B”，不要把最核心底层逻辑全部明文写给店长。</div>

            <hr style="border:none;border-top:1px solid var(--border);margin:18px 0;">

            <h2>备料计算</h2>
            <div class="mode-switch">
              <button class="tab active" data-mode="base">按基准量</button>
              <button class="tab" data-mode="portion">按份数</button>
            </div>

            <div id="baseInputWrap" class="row">
              <div>
                <label for="targetAmount">今天输入的基准量</label>
                <input id="targetAmount" type="number" step="0.01" placeholder="例如：2500" />
              </div>
              <div>
                <label>说明</label>
                <input value="系统会按基准量同比例放大" disabled />
              </div>
            </div>

            <div id="portionInputWrap" class="row hidden">
              <div>
                <label for="targetPortions">今天准备几份</label>
                <input id="targetPortions" type="number" step="0.01" placeholder="例如：35" />
              </div>
              <div>
                <label>说明</label>
                <input value="系统会按份数自动放大整锅配比" disabled />
              </div>
            </div>

            <div class="btns">
              <button class="btn-primary" id="calcBtn">立即计算</button>
              <button class="btn-secondary" id="copyBtn">复制备料清单</button>
            </div>

            <div class="result-summary">
              <div class="summary-box"><div class="k">标准基准量</div><div class="v" id="summaryBase">-</div></div>
              <div class="summary-box"><div class="k">当前输入</div><div class="v" id="summaryTarget">-</div></div>
              <div class="summary-box"><div class="k">放大倍数</div><div class="v" id="summaryRatio">-</div></div>
              <div class="summary-box"><div class="k">预计份数</div><div class="v" id="summaryPortions">-</div></div>
            </div>

            <table>
              <thead>
                <tr>
                  <th>配料</th>
                  <th>标准用量</th>
                  <th>单位</th>
                  <th>今日需用量</th>
                  <th>单份约用量</th>
                </tr>
              </thead>
              <tbody id="resultBody">
                <tr><td colspan="5" class="muted">暂无结果</td></tr>
              </tbody>
            </table>

            <div class="tip" id="exportPreview">这里会显示可直接发给店长或员工的备料清单。</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://vehhqyrqljlgvplmlgfk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlaGhxeXJxbGpsZ3ZwbG1sZ2ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzUzOTEsImV4cCI6MjA4OTI1MTM5MX0.NXs93cMQszFhjlpMLO5ltQbirgE-w4OmChnoTKgA4ZU';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let categories = [];
    let recipes = [];
    let items = [];
    let currentCategoryId = null;
    let currentRecipeId = null;
    let calcMode = 'base';

    const $ = (id) => document.getElementById(id);
    const fmt = (v) => {
      const n = Number(v || 0);
      if (Number.isNaN(n)) return '-';
      if (Number.isInteger(n)) return String(n);
      return n.toFixed(2).replace(/\.00$/, '').replace(/(\.[1-9]*)0+$/, '$1');
    };
    const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

    function currentRecipe() {
      return recipes.find(r => r.id === currentRecipeId) || null;
    }
    function currentItems() {
      return items.filter(i => i.recipe_id === currentRecipeId).sort((a,b) => a.sort_order - b.sort_order);
    }

    async function checkSession() {
      const { data } = await sb.auth.getSession();
      const user = data?.session?.user;
      if (user) {
        $('authView').classList.add('hidden');
        $('appView').classList.remove('hidden');
        $('userInfo').textContent = user.email;
        await loadAll();
      } else {
        $('authView').classList.remove('hidden');
        $('appView').classList.add('hidden');
      }
    }

    async function signUp() {
      const { error } = await sb.auth.signUp({
        email: $('email').value.trim(),
        password: $('password').value.trim()
      });
      $('authMsg').textContent = error ? ('注册失败：' + error.message) : '注册成功，请直接登录。';
    }

    async function signIn() {
      const { data, error } = await sb.auth.signInWithPassword({
        email: $('email').value.trim(),
        password: $('password').value.trim()
      });
      $('authMsg').textContent = error ? ('登录失败：' + error.message) : '登录成功';
      if (!error) {
        $('authView').classList.add('hidden');
        $('appView').classList.remove('hidden');
        $('userInfo').textContent = data.user.email;
        await loadAll();
      }
    }

    async function signOut() {
      await sb.auth.signOut();
      location.reload();
    }

    async function loadAll() {
      const [c1, c2, c3] = await Promise.all([
        sb.from('recipe_categories_v2').select('*').order('sort_order', { ascending: true }),
        sb.from('recipes_v2').select('*').order('sort_order', { ascending: true }),
        sb.from('recipe_items_v2').select('*').order('sort_order', { ascending: true })
      ]);

      if (c1.error) return alert('读取分类失败：' + c1.error.message);
      if (c2.error) return alert('读取配方失败：' + c2.error.message);
      if (c3.error) return alert('读取配料失败：' + c3.error.message);

      categories = c1.data || [];
      recipes = c2.data || [];
      items = c3.data || [];

      if (!currentCategoryId && categories.length) currentCategoryId = categories[0].id;
      if (currentCategoryId && !categories.find(c => c.id === currentCategoryId)) currentCategoryId = categories[0]?.id || null;

      const list = recipes.filter(r => r.category_id === currentCategoryId);
      if (!currentRecipeId && list.length) currentRecipeId = list[0].id;
      if (currentRecipeId && !recipes.find(r => r.id === currentRecipeId)) currentRecipeId = list[0]?.id || null;

      renderCategories();
      renderRecipeList();
      renderEditor();
      renderResults();
    }

    function renderCategories() {
      $('categoryTabs').innerHTML = categories.map(c => `
        <button class="tab ${c.id === currentCategoryId ? 'active' : ''}" data-id="${c.id}">${esc(c.name)}</button>
      `).join('');
    }

    function renderRecipeList() {
      const list = recipes.filter(r => r.category_id === currentCategoryId);
      $('recipeList').innerHTML = list.length ? list.map(r => `
        <div class="recipe-item ${r.id === currentRecipeId ? 'active' : ''}" data-id="${r.id}">
          <div class="recipe-item-top">
            <div class="recipe-item-name">${esc(r.name)}</div>
            <span class="small">#${r.sort_order}</span>
          </div>
          <div class="recipe-item-meta">${esc(r.base_name)} ${fmt(r.base_amount)} ｜ ${fmt(r.yield_per_batch)}份</div>
        </div>
      `).join('') : '<div class="tip">当前分类还没有配方，点“新建配方”开始。</div>';
    }

    function renderEditor() {
      const r = currentRecipe();
      if (!r) {
        $('editorArea').classList.add('hidden');
        $('panelTitle').textContent = '请选择配方';
        return;
      }
      $('editorArea').classList.remove('hidden');
      $('panelTitle').textContent = r.name;
      $('recipeName').value = r.name || '';
      $('yieldPerBatch').value = r.yield_per_batch || '';
      $('baseName').value = r.base_name || '';
      $('baseAmount').value = r.base_amount || '';
      $('targetAmount').value = r.base_amount || '';
      $('targetPortions').value = r.yield_per_batch || '';

      const lines = currentItems();
      $('ingredientsList').innerHTML = lines.map((it, idx) => `
        <div class="ingredient-line" data-index="${idx}">
          <input placeholder="配料名称" value="${esc(it.item_name)}" data-k="item_name" />
          <input type="number" step="0.01" placeholder="用量" value="${it.amount}" data-k="amount" />
          <input placeholder="单位" value="${esc(it.unit || 'g')}" data-k="unit" />
          <input placeholder="备注" value="${esc(it.note || '')}" data-k="note" />
          <div class="btns" style="margin:0;">
            <button class="btn-ghost btn-small" data-act="up">↑</button>
            <button class="btn-ghost btn-small" data-act="down">↓</button>
            <button class="btn-danger btn-small" data-act="del">删</button>
          </div>
        </div>
      `).join('');
    }

    function collectEditor() {
      const r = currentRecipe();
      if (!r) return null;
      const lines = Array.from(document.querySelectorAll('#ingredientsList .ingredient-line'));
      const recipe = {
        ...r,
        name: $('recipeName').value.trim() || '未命名配方',
        yield_per_batch: Number($('yieldPerBatch').value || 0),
        base_name: $('baseName').value.trim() || '水',
        base_amount: Number($('baseAmount').value || 0)
      };
      const recipeItems = lines.map((line, idx) => {
        const inputs = line.querySelectorAll('input');
        return {
          ...currentItems()[Number(line.dataset.index)],
          item_name: inputs[0].value.trim(),
          amount: Number(inputs[1].value || 0),
          unit: inputs[2].value.trim() || 'g',
          note: inputs[3].value.trim(),
          sort_order: idx
        };
      }).filter(x => x.item_name);
      return { recipe, recipeItems };
    }

    async function saveRecipe() {
      const data = collectEditor();
      if (!data) return;

      const { error: e1 } = await sb.from('recipes_v2').update({
        name: data.recipe.name,
        yield_per_batch: data.recipe.yield_per_batch,
        base_name: data.recipe.base_name,
        base_amount: data.recipe.base_amount
      }).eq('id', data.recipe.id);
      if (e1) return alert('保存配方失败：' + e1.message);

      const { error: e2 } = await sb.from('recipe_items_v2').delete().eq('recipe_id', data.recipe.id);
      if (e2) return alert('清空旧配料失败：' + e2.message);

      if (data.recipeItems.length) {
        const payload = data.recipeItems.map((x, idx) => ({
          recipe_id: data.recipe.id,
          item_name: x.item_name,
          amount: x.amount,
          unit: x.unit,
          note: x.note,
          sort_order: idx
        }));
        const { error: e3 } = await sb.from('recipe_items_v2').insert(payload);
        if (e3) return alert('保存配料失败：' + e3.message);
      }

      alert('保存成功');
      await loadAll();
    }

    async function newRecipe() {
      if (!currentCategoryId) return alert('请先有一个分类');
      const list = recipes.filter(r => r.category_id === currentCategoryId);
      const sort = list.length ? Math.max(...list.map(x => x.sort_order || 0)) + 1 : 1;
      const { data, error } = await sb.from('recipes_v2').insert([{
        category_id: currentCategoryId,
        name: '新配方',
        base_name: '水',
        base_amount: 1000,
        yield_per_batch: 20,
        sort_order: sort
      }]).select().single();
      if (error) return alert('新建配方失败：' + error.message);
      currentRecipeId = data.id;
      await sb.from('recipe_items_v2').insert([{ recipe_id: data.id, item_name: '水', amount: 1000, unit: 'g', note: '', sort_order: 0 }]);
      await loadAll();
    }

    async function deleteRecipe() {
      const r = currentRecipe();
      if (!r) return;
      if (!confirm(`确定删除配方「${r.name}」吗？`)) return;
      const { error } = await sb.from('recipes_v2').delete().eq('id', r.id);
      if (error) return alert('删除失败：' + error.message);
      currentRecipeId = null;
      await loadAll();
    }

    async function moveRecipe(direction) {
      const list = recipes.filter(r => r.category_id === currentCategoryId).sort((a,b) => a.sort_order - b.sort_order);
      const idx = list.findIndex(r => r.id === currentRecipeId);
      if (idx < 0) return;
      const targetIdx = direction === 'up' ? idx - 1 : idx + 1;
      if (targetIdx < 0 || targetIdx >= list.length) return;
      const current = list[idx];
      const target = list[targetIdx];
      const a = current.sort_order;
      const b = target.sort_order;
      await sb.from('recipes_v2').update({ sort_order: b }).eq('id', current.id);
      await sb.from('recipes_v2').update({ sort_order: a }).eq('id', target.id);
      await loadAll();
    }

    async function addCategory() {
      const name = prompt('输入新分类名称');
      if (!name) return;
      const sort = categories.length ? Math.max(...categories.map(x => x.sort_order || 0)) + 1 : 1;
      const { error } = await sb.from('recipe_categories_v2').insert([{ name: name.trim(), sort_order: sort }]);
      if (error) return alert('新增分类失败：' + error.message);
      await loadAll();
    }

    async function renameCategory() {
      const c = categories.find(x => x.id === currentCategoryId);
      if (!c) return;
      const name = prompt('输入新的分类名称', c.name);
      if (!name) return;
      const { error } = await sb.from('recipe_categories_v2').update({ name: name.trim() }).eq('id', c.id);
      if (error) return alert('重命名失败：' + error.message);
      await loadAll();
    }

    function calcContext(r) {
      const base = Number(r.base_amount || 0);
      const stdPortions = Number(r.yield_per_batch || 0);
      let ratio = 0, targetText = '-', portions = 0;
      if (calcMode === 'base') {
        const t = Number($('targetAmount').value || 0);
        ratio = base > 0 ? t / base : 0;
        targetText = t ? `${r.base_name} ${fmt(t)}` : '-';
        portions = stdPortions ? stdPortions * ratio : 0;
      } else {
        const p = Number($('targetPortions').value || 0);
        ratio = stdPortions > 0 ? p / stdPortions : 0;
        targetText = p ? `${fmt(p)} 份` : '-';
        portions = p;
      }
      return { base, stdPortions, ratio, targetText, portions };
    }

    function renderResults() {
      const r = currentRecipe();
      if (!r) {
        $('summaryBase').textContent = '-';
        $('summaryTarget').textContent = '-';
        $('summaryRatio').textContent = '-';
        $('summaryPortions').textContent = '-';
        $('resultBody').innerHTML = '<tr><td colspan="5" class="muted">暂无结果</td></tr>';
        $('exportPreview').textContent = '这里会显示可直接发给店长或员工的备料清单。';
        return;
      }
      const lines = collectEditor()?.recipeItems || currentItems();
      const { base, stdPortions, ratio, targetText, portions } = calcContext(r);
      $('summaryBase').textContent = base ? `${r.base_name} ${fmt(base)}` : '-';
      $('summaryTarget').textContent = targetText;
      $('summaryRatio').textContent = ratio ? `${fmt(ratio)} 倍` : '-';
      $('summaryPortions').textContent = portions ? `${fmt(portions)} 份` : '-';
      if (!lines.length || !ratio) {
        $('resultBody').innerHTML = '<tr><td colspan="5" class="muted">请输入数量后再计算</td></tr>';
        $('exportPreview').textContent = '这里会显示可直接发给店长或员工的备料清单。';
        return;
      }
      const rows = lines.map(it => ({ ...it, needed: it.amount * ratio, perPortion: stdPortions ? it.amount / stdPortions : 0 }));
      $('resultBody').innerHTML = rows.map(r => `
        <tr>
          <td>${esc(r.item_name)}${r.note ? `<div class="small">${esc(r.note)}</div>` : ''}</td>
          <td>${fmt(r.amount)}</td>
          <td>${esc(r.unit)}</td>
          <td class="good">${fmt(r.needed)} ${esc(r.unit)}</td>
          <td>${r.perPortion ? fmt(r.perPortion) + ' ' + esc(r.unit) : '-'}</td>
        </tr>
      `).join('');
      $('exportPreview').textContent = [
        `【${r.name}】备料清单`,
        `当前模式：${calcMode === 'base' ? '按基准量' : '按份数'}`,
        `当前输入：${targetText}`,
        `放大倍数：${fmt(ratio)}倍`,
        portions ? `预计份数：${fmt(portions)}份` : '',
        '',
        ...rows.map(x => `${x.item_name}：${fmt(x.needed)} ${x.unit}`)
      ].filter(Boolean).join('\n');
    }

    function addBlankItem() {
      const idx = document.querySelectorAll('#ingredientsList .ingredient-line').length;
      const div = document.createElement('div');
      div.className = 'ingredient-line';
      div.dataset.index = idx;
      div.innerHTML = `
        <input placeholder="配料名称" data-k="item_name" />
        <input type="number" step="0.01" placeholder="用量" data-k="amount" value="0" />
        <input placeholder="单位" data-k="unit" value="g" />
        <input placeholder="备注" data-k="note" />
        <div class="btns" style="margin:0;">
          <button class="btn-ghost btn-small" data-act="up">↑</button>
          <button class="btn-ghost btn-small" data-act="down">↓</button>
          <button class="btn-danger btn-small" data-act="del">删</button>
        </div>
      `;
      $('ingredientsList').appendChild(div);
      renderResults();
    }

    function copyText() {
      navigator.clipboard.writeText($('exportPreview').textContent).then(() => alert('已复制备料清单')).catch(() => alert('复制失败，请手动复制'));
    }

    $('signupBtn').onclick = signUp;
    $('loginBtn').onclick = signIn;
    $('logoutBtn').onclick = signOut;
    $('refreshBtn').onclick = loadAll;
    $('newRecipeBtn').onclick = newRecipe;
    $('deleteRecipeBtn').onclick = deleteRecipe;
    $('moveRecipeUpBtn').onclick = () => moveRecipe('up');
    $('moveRecipeDownBtn').onclick = () => moveRecipe('down');
    $('saveRecipeBtn').onclick = saveRecipe;
    $('addItemBtn').onclick = addBlankItem;
    $('addCategoryBtn').onclick = addCategory;
    $('renameCategoryBtn').onclick = renameCategory;
    $('calcBtn').onclick = renderResults;
    $('copyBtn').onclick = copyText;

    document.addEventListener('click', (e) => {
      const tab = e.target.closest('#categoryTabs .tab');
      if (tab) {
        currentCategoryId = tab.dataset.id;
        currentRecipeId = recipes.filter(r => r.category_id === currentCategoryId).sort((a,b)=>a.sort_order-b.sort_order)[0]?.id || null;
        renderCategories();
        renderRecipeList();
        renderEditor();
        renderResults();
        return;
      }

      const recipeCard = e.target.closest('.recipe-item');
      if (recipeCard) {
        currentRecipeId = recipeCard.dataset.id;
        renderRecipeList();
        renderEditor();
        renderResults();
        return;
      }

      const modeTab = e.target.closest('.mode-switch .tab');
      if (modeTab) {
        document.querySelectorAll('.mode-switch .tab').forEach(x => x.classList.remove('active'));
        modeTab.classList.add('active');
        calcMode = modeTab.dataset.mode;
        $('baseInputWrap').classList.toggle('hidden', calcMode !== 'base');
        $('portionInputWrap').classList.toggle('hidden', calcMode !== 'portion');
        renderResults();
        return;
      }

      const itemBtn = e.target.closest('#ingredientsList button[data-act]');
      if (itemBtn) {
        const line = itemBtn.closest('.ingredient-line');
        const all = Array.from(document.querySelectorAll('#ingredientsList .ingredient-line'));
        const idx = all.indexOf(line);
        const act = itemBtn.dataset.act;
        if (act === 'del') {
          line.remove();
        } else if (act === 'up' && idx > 0) {
          line.parentNode.insertBefore(line, all[idx - 1]);
        } else if (act === 'down' && idx < all.length - 1) {
          line.parentNode.insertBefore(all[idx + 1], line);
        }
        renderResults();
      }
    });

    ['recipeName','yieldPerBatch','baseName','baseAmount','targetAmount','targetPortions'].forEach(id => {
      $(id).addEventListener('input', renderResults);
    });
    $('ingredientsList').addEventListener('input', renderResults);

    checkSession();
  </script>
</body>
</html>
